# Local Postgres for TwitterAI
# From AI/TwitterAI/: docker compose up -d
# DATABASE_URL=postgresql+psycopg2://twitterai:twitterai@localhost:5434/twitterai
# Reset all data: docker compose down -v

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: twitterai
      POSTGRES_PASSWORD: twitterai
      POSTGRES_DB: twitterai
    ports:
      - "5434:5432"
    volumes:
      - twitterai_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twitterai -d twitterai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  twitterai_pgdata:
