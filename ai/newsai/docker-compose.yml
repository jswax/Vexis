# Local Postgres for NewsAI (tables created from schema_postgres.sql on first start).
# From this folder: docker compose up -d
# DATABASE_URL=postgresql+psycopg2://newsai:newsai@localhost:5433/qqq_news
# Reset all data: docker compose down -v

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsai
      POSTGRES_PASSWORD: newsai
      POSTGRES_DB: qqq_news
    ports:
      - "5433:5432"
    volumes:
      - qqq_news_pgdata:/var/lib/postgresql/data
      - ./newsai/db/schema_postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsai -d qqq_news"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qqq_news_pgdata:
